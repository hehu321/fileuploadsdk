<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 42px "Arial Unicode MS", "PingFang SC", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px "Arial Unicode MS", "PingFang SC", sans-serif; fill: #475569; }
      .section-title { font: 700 24px "Arial Unicode MS", "PingFang SC", sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .box-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; }
      .box-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; }
      .box-orange { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
      .box-purple { fill: #f5f3ff; stroke: #c4b5fd; stroke-width: 2; }
      .group-sdk { fill: #ffffff; stroke: #2563eb; stroke-width: 3; }
      .group-app { fill: #ffffff; stroke: #94a3b8; stroke-width: 2.5; }
      .group-backend { fill: #ffffff; stroke: #16a34a; stroke-width: 2.5; }
      .text { font: 700 24px "Arial Unicode MS", "PingFang SC", sans-serif; fill: #0f172a; }
      .small { font: 400 18px "Arial Unicode MS", "PingFang SC", sans-serif; fill: #475569; }
      .tiny { font: 400 16px "Arial Unicode MS", "PingFang SC", sans-serif; fill: #64748b; }
      .label { font: 700 17px "Arial Unicode MS", "PingFang SC", sans-serif; fill: #2563eb; }
      .line { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow); }
      .line-gray { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow-gray); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow-gray); }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1080"/>
  <g transform="translate(0,-120)">

  <rect x="70" y="180" width="390" height="850" rx="24" class="group-app"/>
  <text x="265" y="225" text-anchor="middle" class="section-title">调用方 / React 应用</text>

  <rect x="115" y="270" width="300" height="110" rx="16" class="box-blue"/>
  <text x="265" y="316" text-anchor="middle" class="text">React UI / Hook</text>
  <text x="265" y="348" text-anchor="middle" class="small">选择文件、展示进度、控制任务</text>

  <rect x="115" y="445" width="300" height="125" rx="16" class="box"/>
  <text x="265" y="492" text-anchor="middle" class="text">业务上传参数</text>
  <text x="265" y="524" text-anchor="middle" class="small">projectId / concurrency</text>
  <text x="265" y="550" text-anchor="middle" class="small">whiteList / callbacks</text>

  <rect x="115" y="655" width="300" height="135" rx="16" class="box-orange"/>
  <text x="265" y="702" text-anchor="middle" class="text">Request Adapter</text>
  <text x="265" y="734" text-anchor="middle" class="small">调用方封装 axios/fetch</text>
  <text x="265" y="760" text-anchor="middle" class="small">处理 baseURL / 鉴权 / cookie</text>

  <rect x="115" y="855" width="300" height="125" rx="16" class="box-green"/>
  <text x="265" y="902" text-anchor="middle" class="text">Cache Adapter</text>
  <text x="265" y="934" text-anchor="middle" class="small">getPrivateDb</text>
  <text x="265" y="960" text-anchor="middle" class="small">savePrivateDb / deletePrivateDb</text>

  <rect x="535" y="180" width="760" height="850" rx="28" class="group-sdk"/>
  <text x="915" y="225" text-anchor="middle" class="section-title">Large File Upload SDK TypeScript 源码模块</text>

  <rect x="585" y="270" width="290" height="110" rx="16" class="box-blue"/>
  <text x="730" y="316" text-anchor="middle" class="text">SDK Public API</text>
  <text x="730" y="348" text-anchor="middle" class="small">createLargeFileUploader / upload</text>

  <rect x="955" y="270" width="290" height="110" rx="16" class="box-blue"/>
  <text x="1100" y="316" text-anchor="middle" class="text">Upload Controller</text>
  <text x="1100" y="348" text-anchor="middle" class="small">promise / pause / resume / cancel</text>

  <rect x="585" y="445" width="290" height="120" rx="16" class="box"/>
  <text x="730" y="490" text-anchor="middle" class="text">Chunk Planner</text>
  <text x="730" y="522" text-anchor="middle" class="small">chunkSize / chunks / chunk index</text>
  <text x="730" y="548" text-anchor="middle" class="small">校验 2 - 10000 个分片</text>

  <rect x="955" y="445" width="290" height="120" rx="16" class="box-purple"/>
  <text x="1100" y="490" text-anchor="middle" class="text">Worker Hasher</text>
  <text x="1100" y="522" text-anchor="middle" class="small">整文件 checkCode</text>
  <text x="1100" y="548" text-anchor="middle" class="small">分片 checkCode / 可注入 hash</text>

  <rect x="585" y="640" width="290" height="125" rx="16" class="box-green"/>
  <text x="730" y="687" text-anchor="middle" class="text">Cache Manager</text>
  <text x="730" y="719" text-anchor="middle" class="small">非 hash key 命中任务</text>
  <text x="730" y="745" text-anchor="middle" class="small">缓存 docId / uploadedChunks</text>

  <rect x="955" y="640" width="290" height="125" rx="16" class="box-orange"/>
  <text x="1100" y="687" text-anchor="middle" class="text">Upload Queue</text>
  <text x="1100" y="719" text-anchor="middle" class="small">并发调度分片</text>
  <text x="1100" y="745" text-anchor="middle" class="small">分片完成后回调进度</text>

  <rect x="585" y="835" width="290" height="120" rx="16" class="box-orange"/>
  <text x="730" y="880" text-anchor="middle" class="text">Retry Manager</text>
  <text x="730" y="912" text-anchor="middle" class="small">按配置次数自动重试</text>
  <text x="730" y="938" text-anchor="middle" class="small">失败保留缓存</text>

  <rect x="955" y="835" width="290" height="120" rx="16" class="box-green"/>
  <text x="1100" y="880" text-anchor="middle" class="text">Progress Emitter</text>
  <text x="1100" y="912" text-anchor="middle" class="small">hashing / init / uploading</text>
  <text x="1100" y="938" text-anchor="middle" class="small">merge / success / error</text>

  <rect x="1370" y="180" width="360" height="850" rx="24" class="group-backend"/>
  <text x="1550" y="225" text-anchor="middle" class="section-title">服务端接口</text>

  <rect x="1415" y="300" width="270" height="130" rx="16" class="box-orange"/>
  <text x="1550" y="345" text-anchor="middle" class="text">Init API</text>
  <text x="1550" y="377" text-anchor="middle" class="small">POST ?type=init</text>
  <text x="1550" y="403" text-anchor="middle" class="small">返回 docId / chunks / docVersion</text>

  <rect x="1415" y="535" width="270" height="130" rx="16" class="box-blue"/>
  <text x="1550" y="580" text-anchor="middle" class="text">Upload API</text>
  <text x="1550" y="612" text-anchor="middle" class="small">POST ?type=upload</text>
  <text x="1550" y="638" text-anchor="middle" class="small">上传 multipartFile 分片</text>

  <rect x="1415" y="770" width="270" height="130" rx="16" class="box-green"/>
  <text x="1550" y="815" text-anchor="middle" class="text">Merge API</text>
  <text x="1550" y="847" text-anchor="middle" class="small">POST ?type=merge</text>
  <text x="1550" y="873" text-anchor="middle" class="small">docId + 整文件 checkCode</text>

  <path d="M415 325 L585 325" class="line"/>
  <text x="455" y="305" class="label">调用 upload</text>
  <path d="M415 505 L585 325" class="line-gray"/>
  <text x="438" y="450" class="tiny">传入配置</text>

  <path d="M875 325 L955 325" class="line"/>
  <path d="M730 380 L730 445" class="line"/>
  <path d="M875 505 L955 505" class="line"/>
  <path d="M1100 565 L1100 640" class="line"/>
  <path d="M955 702 L875 702" class="line-gray"/>
  <path d="M875 702 L955 702" class="line"/>
  <path d="M1100 765 L1100 835" class="line"/>
  <path d="M955 895 L875 895" class="line-gray"/>
  <path d="M875 895 L955 895" class="line"/>

  <path d="M585 702 C505 702, 500 918, 415 918" class="dash"/>
  <text x="455" y="832" class="tiny">读写缓存</text>
  <path d="M955 702 C820 615, 570 660, 415 722" class="dash"/>
  <text x="520" y="625" class="tiny">通过 adapter 发请求</text>

  <path d="M1245 365 L1415 365" class="line"/>
  <text x="1278" y="342" class="label">init</text>
  <path d="M1245 600 L1415 600" class="line"/>
  <text x="1278" y="577" class="label">upload chunks</text>
  <path d="M1245 835 L1415 835" class="line"/>
  <text x="1278" y="812" class="label">merge</text>

  <path d="M955 325 C875 410, 875 610, 955 702" class="line-gray"/>
  <path d="M1100 380 L1100 445" class="line"/>
  <path d="M730 565 L730 640" class="line"/>
  <path d="M730 765 L730 835" class="line"/>

  <rect x="90" y="1060" width="1640" height="70" rx="16" class="box"/>
  <text x="130" y="1103" class="small">边界说明：SDK 不内置请求库，不使用 IndexedDB；核心不强绑定 React，额外提供 Hook 薄封装；请求、鉴权、缓存和 hash adapter 均可由调用方适配。</text>
  </g>
</svg>
